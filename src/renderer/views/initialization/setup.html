<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Inkline Setup</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family:
                    "InterVariable", "Inter", "Source Sans 3", "Open Sans",
                    "Segoe UI", system-ui, -apple-system, sans-serif;
                background: #222324;
                color: #f6f7fb;
                overflow: hidden;
            }
            #root {
                width: 100%;
                height: 100vh;
            }
        </style>
    </head>
    <body>
        <div id="root"></div>
    </body>
</html>
